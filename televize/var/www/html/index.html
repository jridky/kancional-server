<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<script src="jquery-3.4.1.min.js"></script>
<style>
html, body{
   background: black;
   width: 100%;
   height: 100%;
   overflow: hidden;
   color: white;
   cursor: none;
   font-family: Arial;
   padding: 0px;
   margin: 0px;
}

#number, #verse{
   margin: 0px;
   padding: 0px;
   text-align: center;
   position: fixed;
   top: 0px;
   right: 0px;
   background: black;
}

.radius{
   border-bottom-left-radius: 15px;
   border-bottom-right-radius: 15px;
}

#verse{
   top: 14%;
   width: 20%;
   line-height: 1.5em;
   height: 5%;
   padding-bottom: 3%;
}

#psalm {
    position: fixed;
    bottom: 0px;
    padding: 0px;
    margin: 0px;
    background: rgba(0,0,0,0.8);
    width: 100%;
}

#number{
   height: 14%;
   width: 20%;
   line-height: 1.5em;
}

#number{
  font-size: 5vw;
  letter-spacing: 10px;
  text-indent: 10px;
  font-weight: bold;
}

#verse{
  font-size: 4vw;
}

#psalm{
  font-size: 10em;
  height: 20%;
}

.centered{
  position: relative;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

#psalm.solo{
   top:10%;
   height: 75%;
}
</style>
</head>
<body>
<video id="video" width="100%" height="100%" autoplay></video>
<div id="number">
<div class="centered"></div>
</div>
<div id="verse" class="radius">
 <div class="centered">
 </div>
</div>
<div id="psalm">
<div class="centered">
</div>
</div>
</body>

<script>
var timeout, socket = false;
$(function(){
	$("#number").css("color","white");
    $("#psalm, #verse, #number").hide();
    var video = document.querySelector("#video");

    checkSocket();
    setInterval(checkSocket, 1800);
    if (navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function (stream) {
                    video.srcObject = stream;
                })
                .catch(function (error) {
                      console.log("Something went wrong!");
            });
    }
});

function checkSocket(){
	if(socket != false){
		if(socket.readyState != WebSocket.CLOSED){
			return;
		}
	}
	socket = new WebSocket('ws://kancional.local:2020');
	socket.addEventListener('message', getMessage, event);
}

function getMessage (event){
	try{
		var answer = JSON.parse(event.data);
		if(timeout != false){
			clearTimeout(timeout);
		}
		timeout = setTimeout(offScreen, 8800000);
		displayValue(answer);
	}catch(error){
		offScreen();
	}
}

function offScreen(){
	clearTimeout(timeout);
	timeout = false;
    $("#psalm, #verse, #number").hide();
    $("#video").show();
    $("#psalm").removeClass("solo");
}

function displayValue(answer){
    if(answer.tv === false){
        $("#video").hide();
        $("#psalm").addClass("solo");
    } else {
        $("#video").show();
        $("#psalm").removeClass("solo");
    }

	if(answer.psalm == ""){
        if(answer.song == ""){
            $("#number, #verse").hide();
        } else {
            $("#number .centered").html(answer.song);
            if(answer.verse != "" && answer.verse != "0"){
                if(isFinite(answer.verse)){
                    $("#verse .centered").html(answer.verse+". sloka");
                } else {
                    $("#verse .centered").html(answer.verse);
                }
                $("#verse").show();
                $("#number").removeClass("radius");
            }else{
                $("#verse .centered").html("");
                $("#verse").hide();
                $("#number").addClass("radius");
            }
            $("#number").show();
        }
        $("#psalm").hide();
    }else{
		$("#psalm .centered").html(answer.psalm);
		$("#number, #verse").hide();
		$("#psalm").show();
		$("#psalm").css("font-size", "30em");
		while( $("#psalm").innerHeight() < $("#psalm").prop("scrollHeight") || $("#psalm").innerWidth() < $("#psalm").prop("scrollWidth")){
			var value = parseInt($("#psalm").css("font-size"));
			value = value - 10;
			$("#psalm").css("font-size", value+"px");
		}
	}

	if(jQuery.isEmptyObject(answer)){
		offScreen();
	}
}
</script>
</html>
